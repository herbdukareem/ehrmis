name: Deploy Laravel + Vue to cPanel (SSH)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ---------- PHP / Composer ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          extensions: mbstring, bcmath, curl, dom, fileinfo, openssl, pdo, pdo_mysql, tokenizer, xml, ctype, json

      - name: Install Composer dependencies (no-dev)
        run: |
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      # ---------- Node / Vite ----------
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install NPM deps
        run: npm ci

      - name: Build Vite assets
        run: npm run build
      - name: Ensure Laravel manifest path
        run: |
          if [ -f public/build/.vite/manifest.json ] && [ ! -f public/build/manifest.json ]; then
            cp public/build/.vite/manifest.json public/build/manifest.json
          fi


      # ---------- Laravel optimize ----------
      - name: Laravel optimize (safe)
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      # ---------- Prepare deploy folder ----------
      - name: Prepare split deploy directories
        run: |
          mkdir -p ./deploy-app ./deploy-public

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "vendor" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude ".env" \
            --exclude "public" \
            --exclude "deploy-app" \
            --exclude "deploy-public" \
            --exclude "storage/*.key" \
            --exclude "storage/logs" \
            --exclude "storage/framework/cache" \
            --exclude "storage/framework/sessions" \
            --exclude "storage/framework/views" \
            --exclude "bootstrap/cache/*.php" \
            ./ ./deploy-app/

          rsync -av --delete \
            ./public/ ./deploy-public/

          # Adjust index.php only in deploy artifact for split hosting layout.
          sed -i "s|__DIR__.'/../storage/framework/maintenance.php'|__DIR__.'/../website/storage/framework/maintenance.php'|" ./deploy-public/index.php
          sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/../website/vendor/autoload.php'|" ./deploy-public/index.php
          sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/../website/bootstrap/app.php'|" ./deploy-public/index.php

      - name: Package deploy artifacts
        run: |
          rm -rf ./deploy-public/storage
          tar -czf deploy-app.tar.gz -C deploy-app .
          tar -czf deploy-public.tar.gz -C deploy-public .

      - name: Ensure remote temp directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          password: ${{ secrets.CPANEL_SSH_PASSWORD }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          command_timeout: 30m
          debug: true
          script: |
            mkdir -p /home/${{ secrets.CPANEL_SSH_USERNAME }}/tmp/gha-deploy

      - name: Upload deploy archives via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          password: ${{ secrets.CPANEL_SSH_PASSWORD }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          command_timeout: 30m
          debug: true
          source: "deploy-app.tar.gz,deploy-public.tar.gz"
          target: "/home/${{ secrets.CPANEL_SSH_USERNAME }}/tmp/gha-deploy"

      - name: Extract archives on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          password: ${{ secrets.CPANEL_SSH_PASSWORD }}
          port: ${{ secrets.CPANEL_SSH_PORT }}
          command_timeout: 30m
          debug: true
          script: |
            set -e
            APP_DIR="${{ secrets.CPANEL_DEPLOY_PATH }}"
            PUBLIC_DIR="${{ vars.CPANEL_SSH_PUBLIC_DIR }}"
            TMP_DIR="/home/${{ secrets.CPANEL_SSH_USERNAME }}/tmp/gha-deploy"

            if [ -z "$APP_DIR" ]; then APP_DIR="/home/${{ secrets.CPANEL_SSH_USERNAME }}/website"; fi
            if [ -z "$PUBLIC_DIR" ]; then PUBLIC_DIR="/home/${{ secrets.CPANEL_SSH_USERNAME }}/public_html"; fi

            echo "Extracting app archive to $APP_DIR"
            mkdir -p "$APP_DIR" "$PUBLIC_DIR"
            tar -xzf "$TMP_DIR/deploy-app.tar.gz" -C "$APP_DIR"

            echo "Extracting public archive to $PUBLIC_DIR"
            tar -xzf "$TMP_DIR/deploy-public.tar.gz" -C "$PUBLIC_DIR"

            # Safety mirror: keep build artifacts available in APP_DIR/public/build too.
            if [ -d "$PUBLIC_DIR/build" ]; then
              echo "Mirroring build assets to $APP_DIR/public/build"
              rm -rf "$APP_DIR/public/build"
              mkdir -p "$APP_DIR/public/build"
              cp -a "$PUBLIC_DIR/build/." "$APP_DIR/public/build/"
            fi

            # Clear Laravel runtime caches on the server so new code/templates are served.
            if [ -f "$APP_DIR/artisan" ]; then
              echo "Clearing Laravel caches"
              php "$APP_DIR/artisan" optimize:clear || true
            fi

            rm -f "$TMP_DIR/deploy-app.tar.gz" "$TMP_DIR/deploy-public.tar.gz"
