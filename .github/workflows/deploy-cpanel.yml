name: Deploy To HMB cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cpanel-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
      CPANEL_SSH_USERNAME: ${{ secrets.CPANEL_SSH_USERNAME }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install backend dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$CPANEL_SSH_PORT" -H "$CPANEL_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote deploy path exists
        run: |
          ssh -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_USERNAME@$CPANEL_SSH_HOST" \
            "mkdir -p \"$CPANEL_DEPLOY_PATH\""

      - name: Upload application archive
        run: |
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude=".env" \
            --exclude="storage/logs" \
            --exclude="storage/framework" \
            --exclude="public/storage" \
            -czf - . \
          | ssh -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_USERNAME@$CPANEL_SSH_HOST" \
            "tar -xzf - -C \"$CPANEL_DEPLOY_PATH\""

      - name: Run remote post-deploy tasks
        run: |
          ssh -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_USERNAME@$CPANEL_SSH_HOST" /bin/bash <<EOF
          set -e
          cd "$CPANEL_DEPLOY_PATH"

          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs

          PHP_BIN=""
          for candidate in \
            /opt/cpanel/ea-php83/root/usr/bin/php \
            /opt/alt/php83/usr/bin/php \
            /usr/local/bin/ea-php83 \
            /usr/bin/ea-php83 \
            ea-php83 \
            /usr/local/bin/alt-php83 \
            alt-php83 \
            php
          do
            if [[ "$candidate" == */* ]]; then
              [ -x "$candidate" ] || continue
              CANDIDATE_BIN="$candidate"
            else
              CANDIDATE_BIN="$(command -v "$candidate" || true)"
              [ -n "$CANDIDATE_BIN" ] || continue
            fi

            if "$CANDIDATE_BIN" -r 'exit(PHP_VERSION_ID >= 80300 ? 0 : 1);' >/dev/null 2>&1; then
              PHP_BIN="$CANDIDATE_BIN"
              break
            fi
          done

          if [ -z "$PHP_BIN" ]; then
            echo "No PHP 8.3+ CLI binary was found on the remote host. This project requires PHP 8.3+."
            echo "Install or enable a PHP 8.3 CLI binary in cPanel, then re-run this deployment."
            exit 1
          fi

          if [ ! -f vendor/autoload.php ]; then
            COMPOSER_BIN="$(command -v composer || true)"
            if [ -z "$COMPOSER_BIN" ] && [ -x /opt/cpanel/composer/bin/composer ]; then
              COMPOSER_BIN="/opt/cpanel/composer/bin/composer"
            fi

            if [ -z "$COMPOSER_BIN" ]; then
              echo "vendor/autoload.php is missing and Composer is not available on the remote host PATH or at /opt/cpanel/composer/bin/composer"
              exit 1
            fi

            "$PHP_BIN" "$COMPOSER_BIN" install --no-dev --prefer-dist --optimize-autoloader --no-interaction
          fi

          if [ -f artisan ] && [ -f vendor/autoload.php ]; then
            "$PHP_BIN" artisan optimize:clear || true
            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache || true
            "$PHP_BIN" artisan view:cache
            "$PHP_BIN" artisan storage:link || true
            "$PHP_BIN" artisan migrate --force
          else
            echo "Skipping artisan tasks; artisan and/or vendor dependencies are unavailable on remote host"
          fi
          EOF
