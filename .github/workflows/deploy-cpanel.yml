name: Deploy To HMB cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cpanel-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      CPANEL_DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
      CPANEL_SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
      CPANEL_SSH_USERNAME: ${{ secrets.CPANEL_SSH_USERNAME }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install backend dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$CPANEL_SSH_PORT" -H "$CPANEL_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote deploy path exists
        run: |
          ssh -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_USERNAME@$CPANEL_SSH_HOST" \
            "mkdir -p \"$CPANEL_DEPLOY_PATH\""

      - name: Upload application archive
        run: |
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude=".env" \
            --exclude="storage/logs" \
            --exclude="storage/framework" \
            --exclude="public/storage" \
            -czf - . \
          | ssh -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_USERNAME@$CPANEL_SSH_HOST" \
            "tar -xzf - -C \"$CPANEL_DEPLOY_PATH\""

      - name: Run remote post-deploy tasks
        run: |
          ssh -p "$CPANEL_SSH_PORT" "$CPANEL_SSH_USERNAME@$CPANEL_SSH_HOST" /bin/bash <<EOF
          set -e
          cd "$CPANEL_DEPLOY_PATH"

          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs

          if [ ! -f vendor/autoload.php ]; then
            COMPOSER_BIN="$(command -v composer || true)"
            if [ -z "$COMPOSER_BIN" ] && [ -x /opt/cpanel/composer/bin/composer ]; then
              COMPOSER_BIN="/opt/cpanel/composer/bin/composer"
            fi

            if [ -z "$COMPOSER_BIN" ]; then
              echo "vendor/autoload.php is missing and Composer is not available on the remote host PATH or at /opt/cpanel/composer/bin/composer"
              exit 1
            fi

            "$COMPOSER_BIN" install --no-dev --prefer-dist --optimize-autoloader --no-interaction
          fi

          if [ -f artisan ] && command -v php >/dev/null 2>&1 && [ -f vendor/autoload.php ]; then
            php artisan optimize:clear || true
            php artisan config:cache
            php artisan route:cache || true
            php artisan view:cache
            php artisan storage:link || true
            php artisan migrate --force
          else
            echo "Skipping artisan tasks; php and/or vendor dependencies are unavailable on remote host"
          fi
          EOF
